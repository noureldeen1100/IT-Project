<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Personal Course</title>
    <link href="css/contact-us.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <span class="logo">Course Organizer</span>
      <nav>
        <a href="index.html">Home</a>
        <a href="my-courses.html">My courses</a>
        <a href="add-course.html">Add course</a>
        <a href="contact-us.html" class="active">Contact us</a>
      </nav>
    </header>
    <main>
      <div class="container">
        <div>
          <h2>Contact Us</h2>
          <p class="contact-p">
            for any inquiries, feedback, or support, please feel free to reach
            out to us
          </p>
        </div>
        <form class="contact-form">
          <label for="fname">First Name </label>
          <input
            type="text"
            id="fname"
            placeholder="Enter your first name here"
            required
          />
          <label for="Lname">Last Name </label>
          <input
            type="text"
            id="Lname"
            placeholder="Enter your last name here"
            required
          />

          <label for="email">Email </label>

          <input
            type="email"
            id="email"
            placeholder="Enter you email here"
            required
          />
          <label for="phone">Phone Number </label>
          <input
            type="text"
            id="phone"
            placeholder="Enter your phone number here"
            required
          />

          <label for="message">Message</label>
          <div class="message-container">
            <textarea
              id="message"
              rows="5"
              placeholder="Enter your message here"
              required
            ></textarea>
          </div>
          <div class="submit-container">
            <button class="submit-button" type="submit">Submit</button>
          </div>
        </form>
      </div>
    </main>
    <footer>
      <p>&copy; 2026 Personal Course Organizer. All rights reserved.</p>
    </footer>
  </body>
</html>
